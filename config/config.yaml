# NewsPulse project-local config
# 说明：
# - 当前项目仅保留 hotlist（热榜）这一类 source type，不再包含 RSS 源。
# - 本文件中的相对路径默认相对于当前项目的 `config/` 目录解析。
# - 可通过环境变量覆盖部分配置；未覆盖时以此文件为准。

app:
  # 时区会影响调度判断、报表时间和输出目录日期。
  timezone: Asia/Shanghai
  # 为 true 时，在通知和 HTML 报告中展示版本更新提示。
  show_version_update: false

schedule:
  # 为 false 时忽略 `timeline.yaml`，直接按 report.mode 执行采集 / 分析 / 推送。
  enabled: true
  # 预设名称来自 `config/timeline.yaml`；`custom` 表示使用自定义时间线。
  preset: morning_evening

platforms:
  enabled: true
  # 仅保留热榜源；每个 id 对应一个内置热榜抓取器。
  sources:
    - id: thepaper
      name: "\u6f8e\u6e43\u65b0\u95fb"
    - id: tencent-hot
      name: "\u817e\u8baf\u70ed\u699c"
    - id: cls-hot
      name: "\u8d22\u8054\u793e\u70ed\u699c"
    - id: wallstreetcn-hot
      name: "\u534e\u5c14\u8857\u89c1\u95fb\u70ed\u699c"
    - id: github-trending-today
      name: GitHub Trending
    - id: hackernews
      name: Hacker News
    - id: juejin
      name: "\u7a00\u571f"

report:
  # `current`: 当前快照；`daily`: 日报；`incremental`: 仅关注本次新增。
  mode: current
  # `keyword`: 按关键词聚合；`platform`: 按平台聚合。
  display_mode: keyword
  # 为 true 时更优先按榜单排名排序；false 时更偏向综合热度。
  sort_by_position_first: false
  # 高亮排名阈值，例如 5 表示前 5 名。
  rank_threshold: 5
  # 0 表示不限制每个关键词展示条数。
  max_news_per_keyword: 0

display:
  # 页面 / 通知分区顺序。可选值：hotlist / new_items / standalone / insight
  region_order:
    - new_items
    - hotlist
    - standalone
    - insight
  regions:
    hotlist: true
    new_items: false
    standalone: false
    insight: true
  standalone:
    # 这些平台会在主报告之外额外单独展示一份榜单摘要。
    platforms:
      - wallstreetcn-hot
    max_items: 20

notification:
  enabled: true
  channels:
    generic_webhook:
      # 通用 Webhook 地址；留空表示未启用。
      # 如需多账号 / 多地址，按项目既有 multi-account 格式填写。
      webhook_url: ''
      # 可选 JSON 模板，占位符：{title} / {content}
      # 留空时默认发送：{"title": "...", "content": "..."}
      payload_template: ''

workflow:
  selection:
    # `keyword`: 频率词匹配；`ai`: 基于兴趣文件的 AI 筛选。
    strategy: ai
    # 如需指定自定义频率词文件，可填写 `custom/keyword/<name>.txt` 或相对路径。
    # 留空时默认使用 `frequency_words.txt`。
    frequency_file:
    # 为 true 时优先按词组优先级排序。
    priority_sort_enabled: true
    ai:
      # 留空时默认使用 `ai_interests.txt`；也可填写 `custom/ai/<name>.txt`。
      # 当 interests 文件中包含 `[TOPIC_CATALOG]` 时，会直接作为原生 topic catalog 使用。
      interests_file:
      # AI 筛选的批处理与阈值配置。
      batch_size: 5
      batch_interval: 2
      min_score: 0.65
      reclassify_threshold: 0.6
      fallback_to_keyword: true
    semantic:
      # 第二层语义召回：默认使用 `.env` 中的 `EMB_MODEL`，并继承 AI_FILTER 的同源 provider 配置。
      enabled: true
      top_k: 5
      min_score: 0.44
      direct_threshold: 0.72

  insight:
    enabled: true
    strategy: ai
    language: Chinese
    # `follow_report` / `daily` / `current` / `incremental`
    mode: follow_report
    # 参与 Insight 的最大入选新闻数。
    max_items: 150
    content:
      cache_enabled: true
      timeout: 12
      reduced_chars: 1800
    item_analysis:
      prompt_file: ai_insight_item_prompt.txt
      min_evidence_sentences: 3
    aggregate:
      prompt_file: ai_analysis_prompt.txt

ai:
  runtime:
    # Default AI runtime inherited by selection / insight unless overridden.
    model: deepseek/deepseek-chat
    api_key: ''
    api_base: ''
    timeout: 120
    temperature: 0.5
    max_tokens: 5000
    num_retries: 1
    fallback_models: []
  operations:
    selection:
      timeout: 480
      num_retries: 0
      temperature: 0
      max_tokens: 1200
      prompt_file: prompt.txt
      extract_prompt_file: extract_prompt.txt
      update_tags_prompt_file: update_tags_prompt.txt
      extra_params:
        do_sample: false
        extra_body:
          thinking:
            type: disabled
    insight:
      prompt_file: ai_analysis_prompt.txt
      item_prompt_file: ai_insight_item_prompt.txt
      extra_params:
        extra_body:
          thinking:
            type: disabled

storage:
  # 当前运行时仅使用本地存储。
  backend: local
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    # 输出目录，相对路径基于项目根目录。
    data_dir: output
    # 0 表示不自动清理历史数据。
    retention_days: 0

advanced:
  debug: false
  log_level: INFO
  log_file: ''
  log_json: false
  # 版本检查地址；留空表示关闭远程版本检查。
  version_check_url: ''
  configs_version_check_url: ''
  crawler:
    # 请求间隔，单位毫秒。
    request_interval: 2000
    use_proxy: false
    default_proxy: http://127.0.0.1:10801
  weight:
    # 热度综合评分权重。
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  # 单个通知渠道最多使用多少个账号 / 地址。
  max_accounts_per_channel: 3
  batch_size:
    # 默认通知分批字节上限。
    default: 4000
  # 多批通知之间的间隔秒数。
  batch_send_interval: 3
