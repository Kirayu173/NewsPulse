
            app:
              timezone: Asia/Shanghai
            schedule:
              enabled: false
              preset: always_on
            platforms:
              enabled: true
              sources:
                - id: thepaper
                  name: 婢庢箖鏂伴椈
            report:
              mode: current
              display_mode: keyword
              rank_threshold: 10
