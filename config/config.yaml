                api_base: ""
              operations:
                selection:
                  prompt_file: ai_filter/prompt.txt
                  extract_prompt_file: ai_filter/extract_prompt.txt
                  update_tags_prompt_file: ai_filter/update_tags_prompt.txt
                insight:
                  prompt_file: global_insight_prompt.txt
            storage:
              backend: local
